<!-- ====== FIREBASE SETUP ====== -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔴 আপনার Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBvoJkTeAErHbU9IC9PYKlMvbWt_0vmMwg",
  authDomain: "hishab-f5039.firebaseapp.com",
  projectId: "hishab-f5039",
  storageBucket: "hishab-f5039.firebasestorage.app",
  messagingSenderId: "653131584820",
  appId: "1:653131584820:web:11e271e93c92a533e98161"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ====== GLOBAL VARIABLES ======
let products = [];
let salesList = [];
let totalSales = 0;
let totalProfit = 0;
let totalInvestment = 0;

// RESET PASSWORD ONLY
const RESET_PASSWORD = "reset786";

// ====== PAGE NAVIGATION ======
window.showPage = function(page){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
  document.getElementById(page).classList.add("active-page");

  dashboardBtn.classList.remove("active-tab");
  addInfoBtn.classList.remove("active-tab");

  if(page === "dashboard"){
    dashboardBtn.classList.add("active-tab");
  } else {
    addInfoBtn.classList.add("active-tab");
  }
}

// ====== FORM NAVIGATION ======
window.showForm = function(type){
  saleForm.classList.add("hide");
  productForm.classList.add("hide");

  saleTab.classList.remove("active-tab");
  productTab.classList.remove("active-tab");

  if(type === "sale"){
    saleForm.classList.remove("hide");
    saleTab.classList.add("active-tab");
  } else {
    productForm.classList.remove("hide");
    productTab.classList.add("active-tab");
  }
}

// ====== HISTORY ======
window.showHistory = function(type){
  salesHistoryCard.style.display = "none";
  productHistoryCard.style.display = "none";

  salesHistoryBtn.classList.remove("active-history");
  productHistoryBtn.classList.remove("active-history");

  if(type === "sales"){
    salesHistoryCard.style.display = "block";
    salesHistoryBtn.classList.add("active-history");
  } else {
    productHistoryCard.style.display = "block";
    productHistoryBtn.classList.add("active-history");
    updateProductHistoryTable();
  }
}

// ====== GLOBAL EDIT VARIABLE ======
let currentEditSale = null;

window.editSale = function(sale, index){
  currentEditSale = sale;
  
  document.getElementById("editCustomerName").value = sale.customerName;
  document.getElementById("editProduct").value = sale.productName;
  document.getElementById("editSellPrice").value = sale.sellPrice;
  
  document.getElementById("editModal").classList.add("show");
};

// ====== CLOSE MODAL ======
window.closeEditModal = function(){
  document.getElementById("editModal").classList.remove("show");
  currentEditSale = null;
};

// ====== SAVE SALE CHANGES ======
window.saveSaleChanges = async function(){
  if(!currentEditSale) return;

  let newCustomer = document.getElementById("editCustomerName").value.trim();
  let newProduct = document.getElementById("editProduct").value.trim();
  let newPrice = Number(document.getElementById("editSellPrice").value);

  if(!newCustomer || !newProduct || newPrice <= 0) {
    alert("❌ Please fill all fields correctly");
    return;
  }

  // পুরোনো প্রোডাক্ট খুঁজে বের করা
  let oldPr = products.find(p => p.name.toLowerCase() === currentEditSale.productName.toLowerCase());
  let newPr = products.find(p => p.name.toLowerCase() === newProduct.toLowerCase());

  if(!newPr) {
    alert("❌ Product not found");
    return;
  }

  try {
    // Firebase এ সেল আপডেট করা
    if(currentEditSale.id) {
      const saleQuery = query(collection(db, "sales"), where("customerName", "==", currentEditSale.customerName), where("productName", "==", currentEditSale.productName));
      const saleSnap = await getDocs(saleQuery);
      
      saleSnap.forEach(async (docSnap) => {
        await updateDoc(doc(db, "sales", docSnap.id), {
          customerName: newCustomer,
          productName: newProduct,
          sellPrice: newPrice,
          profit: newPrice - newPr.cost,
          dateTime: currentEditSale.dateTime
        });
      });
    }

    // পুরোনো ডেটা রিভার্ট - শুধু স্টক এবং সেলস
    if(oldPr) {
      oldPr.qty += 1;
    }
    totalSales -= currentEditSale.sellPrice;
    totalProfit -= currentEditSale.profit;

    // নতুন ডেটা - শুধু স্টক এবং সেলস
    newPr.qty -= 1;
    // Investment কোনোভাবেই পরিবর্তন হবে না!

    let newProfit = (newPrice - newPr.cost);
    totalSales += newPrice;
    totalProfit += newProfit;

    // সেলস লিস্ট আপডেট করা
    currentEditSale.customerName = newCustomer;
    currentEditSale.productName = newProduct;
    currentEditSale.sellPrice = newPrice;
    currentEditSale.profit = newProfit;

    updateSalesTable();
    updateSummary();

    closeEditModal();
    alert("✅ Sale updated successfully!");
  } catch(error){
    alert("❌ Error: " + error.message);
  }
};
function updateProductHistoryTable(){
  let t = productHistoryTable;
  t.innerHTML = "";
  products.forEach(p => {
    let r = t.insertRow();
    r.insertCell(0).innerText = p.name;
    r.insertCell(1).innerText = p.cost;
    r.insertCell(2).innerText = p.qty;
  });
}

// ====== UPDATE SALES TABLE ======
function updateSalesTable(){
  let t = salesTableBody;
  t.innerHTML = "";
  salesList.slice().reverse().forEach((s, index) => {
    let r = t.insertRow();
    r.insertCell(0).innerText = s.customerName;
    r.insertCell(1).innerText = s.productName;
    r.insertCell(2).innerText = s.sellPrice;
    r.insertCell(3).innerText = s.profit;
    r.insertCell(4).innerText = s.dateTime;
    
    // শুধু Edit বাটন
    let actionCell = r.insertCell(5);
    
    let editBtn = document.createElement("button");
    editBtn.innerText = "✏️ Edit";
    editBtn.className = "edit-btn";
    editBtn.onclick = () => editSale(s, index);
    actionCell.appendChild(editBtn);
  });
}

// ====== UPDATE SUMMARY ======
function updateSummary(){
  investment.innerText = totalInvestment;
  sales.innerText = totalSales;
  profit.innerText = totalProfit;
  stockValue.innerText = products.reduce((a,b) => a + (b.cost * b.qty), 0);
}

// ====== STATUS MESSAGE ======
function showStatus(elementId, message, type){
  const statusEl = document.getElementById(elementId);
  statusEl.innerText = message;
  statusEl.className = "status-msg show status-" + type;
  
  if(type !== "loading"){
    setTimeout(() => {
      statusEl.innerText = "";
      statusEl.className = "status-msg";
    }, 3000);
  }
}

// ====== ADD PRODUCT (FIREBASE) ======
window.addProduct = async function(){
  let n = productName.value.trim();
  let c = Number(costPrice.value);
  let q = Number(quantity.value);

  if(!n || c <= 0 || q <= 0) {
    showStatus("productStatus", "❌ Invalid input", "error");
    return;
  }

  try {
    showStatus("productStatus", "⏳ Saving...", "loading");

    let investAmount = c * q;

    // Firebase এ save করা
    await addDoc(collection(db, "products"), {
      name: n,
      cost: c,
      qty: q,
      investedAmount: investAmount,
      createdAt: new Date().toLocaleString()
    });

    // Local array update
    let ex = products.find(p => p.name.toLowerCase() === n.toLowerCase());
    if(ex){
      ex.qty += q;
      ex.investedAmount = (ex.investedAmount || 0) + investAmount;
    } else {
      products.push({
        id: Date.now(),
        name: n,
        cost: c,
        qty: q,
        investedAmount: investAmount
      });
    }

    totalInvestment += investAmount;

    updateProductHistoryTable();
    updateSummary();

    productName.value = "";
    costPrice.value = "";
    quantity.value = "";

    showStatus("productStatus", "✅ Product saved online!", "success");
  } catch(error){
    showStatus("productStatus", "❌ Error: " + error.message, "error");
  }
};

// ====== ADD SALE (FIREBASE) ======
window.addSale = async function(){
  let cn = customerName.value.trim();
  let n = saleProduct.value.trim();
  let p = Number(sellPrice.value);
  let q = 1;

  if(!cn) {
    showStatus("saleStatus", "❌ Customer name required", "error");
    return;
  }

  let pr = products.find(x => x.name.toLowerCase() === n.toLowerCase());
  if(!pr || pr.qty < q) {
    showStatus("saleStatus", "❌ Stock issue", "error");
    return;
  }

  try {
    showStatus("saleStatus", "⏳ Saving...", "loading");

    let profitAmount = (p - pr.cost) * q;

    // Firebase এ sale save করা
    await addDoc(collection(db, "sales"), {
      customerName: cn,
      productName: pr.name,
      sellPrice: p,
      profit: profitAmount,
      dateTime: new Date().toLocaleString()
    });

    // Firebase এ প্রোডাক্ট স্টক আপডেট করা
    const productQuery = query(collection(db, "products"), where("name", "==", pr.name));
    const productSnap = await getDocs(productQuery);
    
    productSnap.forEach(async (docSnap) => {
      await updateDoc(doc(db, "products", docSnap.id), {
        qty: docSnap.data().qty - q
      });
    });

    // Local update - Investment টাচ করছি না!
    pr.qty -= q;
    totalSales += p * q;
    totalProfit += profitAmount;
    // totalInvestment কোনোভাবেই পরিবর্তন হবে না

    salesList.push({
      customerName: cn,
      productName: pr.name,
      sellPrice: p,
      profit: profitAmount,
      dateTime: new Date().toLocaleString()
    });

    updateSalesTable();
    updateSummary();

    customerName.value = "";
    saleProduct.value = "";
    sellPrice.value = "";

    showStatus("saleStatus", "✅ Sale saved online!", "success");
  } catch(error){
    showStatus("saleStatus", "❌ Error: " + error.message, "error");
  }
};

window.resetAllData = async function(){
  let pass = prompt("Reset Password");
  if(pass !== RESET_PASSWORD) return;

  try {
    const prodSnap = await getDocs(collection(db, "products"));
    prodSnap.forEach(d => deleteDoc(d.ref));

    const salesSnap = await getDocs(collection(db, "sales"));
    salesSnap.forEach(d => deleteDoc(d.ref));

    products = [];
    salesList = [];
    totalSales = 0;
    totalProfit = 0;
    totalInvestment = 0;

    updateProductHistoryTable();
    updateSalesTable();
    updateSummary();

    alert("✅ Full Reset Done (Firebase + Local)");
  } catch(error){
    alert("❌ Error: " + error.message);
  }
};

// ====== LOAD DATA FROM FIREBASE ======
async function loadDataFromFirebase(){
  try {
    // Load Products
    const productsSnapshot = await getDocs(collection(db, "products"));
    products = [];
    totalInvestment = 0;

    productsSnapshot.forEach((doc) => {
      const data = doc.data();
      products.push({
        id: doc.id,
        name: data.name,
        cost: data.cost,
        qty: data.qty,
        investedAmount: data.investedAmount || (data.cost * data.qty)
      });
      totalInvestment += data.investedAmount || (data.cost * data.qty);
    });

    // Load Sales
    const salesSnapshot = await getDocs(collection(db, "sales"));
    salesList = [];
    totalSales = 0;
    totalProfit = 0;

    salesSnapshot.forEach((doc) => {
      const data = doc.data();
      salesList.push({
        id: doc.id,
        customerName: data.customerName,
        productName: data.productName,
        sellPrice: data.sellPrice,
        profit: data.profit,
        dateTime: data.dateTime
      });
      totalSales += data.sellPrice;
      totalProfit += data.profit;
    });

    updateSalesTable();
    updateSummary();
    console.log("✅ Data loaded from Firebase");
  } catch(error){
    console.error("❌ Error loading data:", error);
  }
}

// ====== INIT ======
window.init = async function(){
  await loadDataFromFirebase();
  updateSalesTable();
  updateSummary();
};

init();

</script>
